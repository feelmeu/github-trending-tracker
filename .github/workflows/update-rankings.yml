name: Update AI Rankings

on:
  schedule:
    # 每天北京时间 08:00 和 20:00 运行 (UTC 00:00 和 12:00)
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scrape script
        run: python scrape-rankings.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rankings.json
          if git diff --cached --quiet; then
            echo "No changes to rankings.json"
          else
            git commit -m "auto-update rankings.json [skip ci] - $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S') CST"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
