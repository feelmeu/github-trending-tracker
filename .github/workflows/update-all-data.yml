name: Update All Data

on:
  schedule:
    # 每天北京时间 06:00 运行 (UTC 22:00 前一天)
    - cron: '0 22 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update-all-data.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add rankings.json boxoffice-data.json
          if git diff --cached --quiet; then
            echo "No changes to data files"
          else
            git commit -m "auto-update data [skip ci] - $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M:%S') CST"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
